name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install Quartz dependencies
        working-directory: source
        run: npm ci

      - name: Install Quartz plugins
        working-directory: source
        run: node quartz/bootstrap-cli.mjs plugin install

      - name: Build Quartz site
        working-directory: source
        run: node quartz/bootstrap-cli.mjs build -o public && mv public/index public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: source/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
